// MAP
// ============================================================
function generateMap(act) {
  const rows = [];
  rows.push([{ type:'fight', connections:[], visited:false, available:true, col:0 }]);
  const slots = [1,2,3,4,5]; shuffleArray(slots);
  const [eliteR, restR, eventR, shopR] = slots;

  for (let r=1; r<=5; r++) {
    const nc = 2 + Math.floor(Math.random()*2);
    const rn = [];
    for (let i=0; i<nc; i++) {
      let type = 'fight';
      if (r===eliteR && i===0) type='elite';
      else if (r===restR && i===Math.floor(nc/2)) type='rest';
      else if (r===eventR && i===0) type='event';
      else if (r===shopR && i===nc-1) type='shop';
      rn.push({ type, connections:[], visited:false, available:false, col:i });
    }
    rows.push(rn);
  }
  rows.push([{ type:'boss', connections:[], visited:false, available:false, col:0 }]);

  for (let r=0; r<rows.length-1; r++) {
    const cur = rows[r], nxt = rows[r+1];
    cur.forEach((node, ni) => {
      if (nxt.length === 1) { node.connections.push(0); }
      else {
        const ratio = ni / Math.max(1, cur.length-1);
        const ti = Math.round(ratio * (nxt.length-1));
        node.connections.push(ti);
        if (Math.random()<0.5) {
          const alt = ti + (Math.random()<0.5?1:-1);
          if (alt>=0 && alt<nxt.length && !node.connections.includes(alt)) node.connections.push(alt);
        }
      }
    });
    nxt.forEach((_, ni) => {
      if (!cur.some(n => n.connections.includes(ni))) {
        cur[Math.floor(Math.random()*cur.length)].connections.push(ni);
      }
    });
  }
  return rows;
}

function renderMap() {
  const c = document.getElementById('map-container');
  c.innerHTML = ''; c.style.position = 'relative';
  document.getElementById('map-hp').textContent = `${G.hp}/${G.maxHp}`;
  document.getElementById('map-gold').textContent = G.gold;
  document.getElementById('map-act-label').textContent = G.actNames[G.act];

  const icons = { fight:'⚔️', elite:'💀', rest:'🌙', event:'❓', shop:'🏮', boss:'👑' };
  const nodePositions = [];

  G.map.forEach((row, ri) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'map-row';
    const rowPos = [];
    row.forEach((node, ni) => {
      const nd = document.createElement('div');
      nd.className = 'map-node';
      nd.textContent = icons[node.type] || '?';
      if (node.visited) nd.classList.add('visited');
      if (node.available) nd.classList.add('available');
      if (ri===G.currentRow && ni===G.currentNodeIndex) nd.classList.add('current');
      if (node.available && !node.visited) nd.onclick = () => visitNode(ri, ni);
      rowDiv.appendChild(nd);
      rowPos.push({ node:nd, connections: node.connections });
    });
    nodePositions.push(rowPos);
    c.appendChild(rowDiv);
  });

  requestAnimationFrame(() => {
    const old = c.querySelector('svg.map-lines');
    if (old) old.remove();
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.classList.add('map-lines');
    Object.assign(svg.style, { position:'absolute', top:'0', left:'0', width:'100%', height:'100%', pointerEvents:'none', zIndex:'0' });
    const cr = c.getBoundingClientRect();
    nodePositions.forEach((row, ri) => {
      if (ri >= G.map.length-1) return;
      row.forEach(({node:fn, connections}) => {
        const fr = fn.getBoundingClientRect();
        const fx = fr.left+fr.width/2-cr.left, fy = fr.top+fr.height/2-cr.top;
        connections.forEach(ci => {
          if (ri+1<nodePositions.length && ci<nodePositions[ri+1].length) {
            const tn = nodePositions[ri+1][ci].node;
            const tr = tn.getBoundingClientRect();
            const line = document.createElementNS('http://www.w3.org/2000/svg','line');
            line.setAttribute('x1',fx); line.setAttribute('y1',fy);
            line.setAttribute('x2',tr.left+tr.width/2-cr.left); line.setAttribute('y2',tr.top+tr.height/2-cr.top);
            line.setAttribute('stroke','rgba(201,168,76,0.15)'); line.setAttribute('stroke-width','1.5');
            svg.appendChild(line);
          }
        });
      });
    });
    c.appendChild(svg);
  });
}

function visitNode(row, ni) {
  const node = G.map[row][ni];
  if (!node.available || node.visited) return;
  node.visited = true;
  G.currentRow = row; G.currentNodeIndex = ni;
  G.map.forEach(r => r.forEach(n => n.available = false));
  if (row < G.map.length-1) node.connections.forEach(ci => { if(ci<G.map[row+1].length) G.map[row+1][ci].available = true; });
  G.floorsCleared++;
  switch(node.type) {
    case 'fight': startCombat(getRandomEnemies(G.act,'normal')); break;
    case 'elite': startCombat(getRandomEnemies(G.act,'elite')); break;
    case 'boss': startCombat(getRandomEnemies(G.act,'boss')); break;
    case 'rest': showRestScreen(); break;
    case 'event': showEventScreen(); break;
    case 'shop': showShopScreen(); break;
  }
}

function getRandomEnemies(act, type) {
  const pool = [];
  for (const [key, def] of Object.entries(ENEMY_DEFS)) {
    if (def.act === act && def.type === type) pool.push({...def, enemyKey:key});
  }
  if (type === 'normal') {
    const count = Math.random()<0.4 ? 2 : 1;
    const avail = [...pool]; const res = [];
    for (let i=0; i<count && avail.length>0; i++) {
      const idx = Math.floor(Math.random()*avail.length);
      res.push({...avail[idx]}); avail.splice(idx,1);
    }
    return res;
  }
  return [{ ...pool[Math.floor(Math.random()*pool.length)] }];
}

// ============================================================
// COMBAT
// ============================================================
function startCombat(enemyDefs) {
  const isBoss = enemyDefs.some(e => e.type === 'boss');
  G.enemies = enemyDefs.map(def => ({
    ...def, maxHp: def.hp, block:0, strength:0, vulnerable:0, weak:0,
    stunned:false, reflecting:false, nextIntent:null, element:null, tc:0,
  }));
  G.drawPile = shuffleArray([...G.deck]);
  G.discardPile = []; G.exhaustPile = []; G.hand = [];
  G.energy = G.maxEnergy; G.block = 0;
  G.sentence = []; G.enemyTargets = [];
  G.allCardsCostZero = false; G.poeticAura = false; G.poeticAuraNext = false;
  G.turn = 0; G.vulnerable = 0; G.weak = 0;
  G.drawLessNextTurn = 0;

  showScreen('combat-screen');
  if (isBoss) playBossMusic(); else playCombatMusic();
  G.enemies.forEach(e => e.ai(e));
  startPlayerTurn();
}

function startPlayerTurn() {
  G.turn++;
  G.block = 0; G.energy = G.maxEnergy + (G._bonusEnergyNext || 0);
  G._bonusEnergyNext = 0;
  G.allCardsCostZero = false;
  G.poeticAura = G.poeticAuraNext || false;
  G.poeticAuraNext = false;
  G.sentence = [];
  if (G.vulnerable > 0) G.vulnerable--;
  if (G.weak > 0) G.weak--;
  let dc = META.perks.includes('extra_scroll') ? 6 : 5;
  dc -= G.drawLessNextTurn;
  if (dc < 1) dc = 1;
  G.drawLessNextTurn = 0;
  if (G.turn === 1) VFX.spawnInkParticles();
  VFX.turnCircle();
  drawCards(dc);
  renderCombat();
  // Animate dealt cards
  requestAnimationFrame(() => {
    document.querySelectorAll('#hand-cards .card').forEach((c, i) => {
      c.style.animationDelay = (i * 0.08) + 's';
      c.classList.add('card-deal-anim');
    });
  });
}

function drawCards(count) {
  for (let i=0; i<count; i++) {
    if (G.drawPile.length === 0) {
      if (G.discardPile.length === 0) return;
      G.drawPile = shuffleArray([...G.discardPile]);
      G.discardPile = [];
    }
    if (G.drawPile.length > 0) G.hand.push(G.drawPile.pop());
  }
}

function getEffectiveCost(card) {
  if (card._isEnemyTarget || card._isSelfTarget) return 0;
  if (G.allCardsCostZero) return 0;
  return card.cost;
}

function getSentenceCost() {
  return G.sentence.reduce((sum, c) => sum + getEffectiveCost(c), 0);
}

// ============================================================
// RENDER
// ============================================================
function renderCombat() {
  document.getElementById('combat-hp').textContent = `${G.hp}/${G.maxHp}`;
  document.getElementById('combat-block-display').innerHTML = G.block > 0 ? `🛡️ <b style="font-size:1.3em">${G.block}</b>` : '';

  let st = '';
  if (G.strength>0) st += `<span class="status-icon status-strength">力${G.strength}</span>`;
  if (G.vulnerable>0) st += `<span class="status-icon status-vulnerable">伤${G.vulnerable}</span>`;
  if (G.weak>0) st += `<span class="status-icon status-weak">弱${G.weak}</span>`;
  const stBar = document.getElementById('combat-status-effects-bar');
  if (stBar) stBar.innerHTML = st;
  // Also keep old one for floating text target
  const stOld = document.getElementById('combat-status-effects');
  if (stOld) stOld.innerHTML = st;
  document.getElementById('draw-count').textContent = G.drawPile.length;
  document.getElementById('discard-count').textContent = G.discardPile.length;
  document.getElementById('energy-text').textContent = G.energy;

  renderEnemies();
  renderEnemyTargetBar();
  renderSentenceSlots();
  renderHand();
  updateChantButton();
}

function renderEnemies() {
  const area = document.getElementById('enemy-area');
  area.innerHTML = '';
  const targetedIdx = getTargetedEnemyIdx();

  G.enemies.forEach((enemy, idx) => {
    if (enemy.hp <= 0) return;
    const div = document.createElement('div');
    div.className = 'enemy';
    if (idx === targetedIdx) div.classList.add('targeted');

    let ic = 'attack-intent', it = '';
    if (enemy.nextIntent) {
      const ni = enemy.nextIntent;
      if (ni.type==='attack') { ic='attack-intent'; it=`${ni.icon} ${ni.value}${ni.hits>1?'×'+ni.hits:''}`; }
      else if (ni.type==='defend') { ic='defend-intent'; it=`${ni.icon} ${ni.label||ni.value}`; }
      else if (ni.type==='buff') { ic='buff-intent'; it=`${ni.icon} ${ni.label||''}`; }
      else if (ni.type==='debuff') { ic='debuff-intent'; it=`${ni.icon} ${ni.label||''}`; }
      else if (ni.type==='special') { ic='special-intent'; it=`${ni.icon} ${ni.label||''}`; }
    }

    // Make enemy clickable to add as target
    const hasVerb = G.sentence.some(c => c.pos === 'verb');
    if (hasVerb) div.classList.add('targetable');

    div.innerHTML = `
      <div class="enemy-intent ${ic}">${it}</div>
      <div class="enemy-portrait">${enemy.emoji||'👾'}</div>
      ${enemy.block>0?`<div class="enemy-block-indicator">🛡${enemy.block}</div>`:''}
      <div class="enemy-name" style="font-size:1.05rem;margin-top:4px;">${enemy.name}</div>
      <div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:${(enemy.hp/enemy.maxHp)*100}%"></div></div>
      <div class="enemy-hp-text">${enemy.hp}/${enemy.maxHp}</div>
      <div class="enemy-status-effects">
        ${enemy.vulnerable>0?'<span class="status-icon status-vulnerable">伤'+enemy.vulnerable+'</span>':''}
        ${enemy.weak>0?'<span class="status-icon status-weak">弱'+enemy.weak+'</span>':''}
        ${(enemy.strength||0)>0?'<span class="status-icon status-strength">力'+enemy.strength+'</span>':''}
      </div>
    `;
    // Click enemy card = add as target
    div.onclick = () => {
      const inSentence = G.sentence.some(c => c._isEnemyTarget && c._enemyIdx === idx);
      if (inSentence) return;
      const hasHeConn = G.sentence.some(c => c.multiTarget);
      if (!hasHeConn) {
        G.sentence = G.sentence.filter(c => !c._isEnemyTarget && !c._isSelfTarget);
      } else {
        G.sentence = G.sentence.filter(c => !c._isSelfTarget);
      }
      const enemyCard = {
        word: enemy.name, pos: 'object', cost: 0,
        _isEnemyTarget: true, _enemyIdx: idx,
        id: 'enemy_target_' + idx + '_' + Math.random().toString(36).substr(2,5),
      };
      G.sentence.push(enemyCard);
      playSFX('card');
      renderCombat();
    };
    enemy.element = div;
    area.appendChild(div);
  });
}

function getTargetedEnemyIdx() {
  const enemyObj = G.sentence.find(c => c._isEnemyTarget);
  if (enemyObj) return enemyObj._enemyIdx;
  return -1;
}

function renderEnemyTargetBar() {
  const bar = document.getElementById('enemy-targets-bar');
  bar.innerHTML = '';

  G.enemies.forEach((enemy, idx) => {
    if (enemy.hp <= 0) return;
    const el = document.createElement('div');
    el.className = 'enemy-target-word';
    el.textContent = `⟨${enemy.name}⟩`;
    const inSentence = G.sentence.some(c => c._isEnemyTarget && c._enemyIdx === idx);
    if (inSentence) el.classList.add('in-sentence');
    el.onclick = () => {
      if (inSentence) return;
      const hasHeConn = G.sentence.some(c => c.multiTarget);
      if (!hasHeConn) {
        G.sentence = G.sentence.filter(c => !c._isEnemyTarget && !c._isSelfTarget);
      } else {
        G.sentence = G.sentence.filter(c => !c._isSelfTarget);
      }
      const enemyCard = {
        word: enemy.name, pos: 'object', cost: 0,
        _isEnemyTarget: true, _enemyIdx: idx,
        id: 'enemy_target_' + idx + '_' + Math.random().toString(36).substr(2,5),
      };
      G.sentence.push(enemyCard);
      playSFX('card');
      renderCombat();
    };
    bar.appendChild(el);
  });
}

function renderSentenceSlots() {
  const container = document.getElementById('sentence-slots-container');
  container.innerHTML = '';

  const displayCards = normalizeSentence(G.sentence);
  const commaIdx = displayCards.findIndex(c => c.pos === 'punctuation' && c.punctType === 'comma');

  if (commaIdx >= 0) {
    const firstHalf = displayCards.slice(0, commaIdx);
    const secondHalf = displayCards.slice(commaIdx + 1);

    const half1 = document.createElement('div');
    half1.className = 'sentence-half';
    firstHalf.forEach((card) => {
      const origIdx = G.sentence.indexOf(card);
      half1.appendChild(createSentenceWordEl(card, origIdx));
    });
    if (firstHalf.length === 0) {
      const ph = document.createElement('span');
      ph.style.cssText = 'color:var(--smoke);opacity:0.3;font-size:0.75rem;font-style:italic;';
      ph.textContent = '上句...';
      half1.appendChild(ph);
    }
    container.appendChild(half1);

    const divider = document.createElement('div');
    divider.className = 'sentence-comma-divider';
    divider.style.cursor = 'pointer';
    const commaOrigIdx = G.sentence.indexOf(displayCards[commaIdx]);
    divider.onclick = () => removeSentenceWord(commaOrigIdx);
    container.appendChild(divider);

    const half2 = document.createElement('div');
    half2.className = 'sentence-half';
    secondHalf.forEach((card) => {
      const origIdx = G.sentence.indexOf(card);
      half2.appendChild(createSentenceWordEl(card, origIdx));
    });
    if (secondHalf.length === 0) {
      const ph = document.createElement('span');
      ph.style.cssText = 'color:var(--smoke);opacity:0.3;font-size:0.75rem;font-style:italic;';
      ph.textContent = '下句...';
      half2.appendChild(ph);
    }
    container.appendChild(half2);
  } else {
    const half = document.createElement('div');
    half.className = 'sentence-half';
    displayCards.forEach((card) => {
      const origIdx = G.sentence.indexOf(card);
      half.appendChild(createSentenceWordEl(card, origIdx));
    });
    container.appendChild(half);
  }

  // Preview — calligraphy style
  const preview = document.getElementById('sentence-preview');
  if (G.sentence.length > 0) {
    const normalized = normalizeSentence(G.sentence);
    preview.textContent = '「' + normalized.map(c => c._isEnemyTarget ? c.word : (c._isSelfTarget ? '我' : c.word)).join('') + '」';
  } else {
    preview.textContent = '';
  }

  // Duizhang preview
  const dzEl = document.getElementById('duizhang-preview');
  if (commaIdx >= 0) {
    const dzResult = detectDuizhang(normalizeSentence(G.sentence));
    if (dzResult) {
      dzEl.className = dzResult.matched ? 'duizhang-good' : 'duizhang-bad';
      dzEl.textContent = dzResult.label;
    } else {
      dzEl.className = 'duizhang-bad';
      dzEl.textContent = '逗号两侧需要词语才能判定对仗';
    }
  } else {
    dzEl.textContent = '';
  }

  // Score preview with icons
  const sp = document.getElementById('sentence-score-preview');
  if (G.sentence.length > 0) {
    // Check for summon pattern first
    const summonCheck = detectSummon(G.sentence);
    if (summonCheck) {
      const eff = SUMMON_EFFECTS[summonCheck.summonName];
      sp.innerHTML = `<span>费${getSentenceCost()}</span> <span style="color:var(--neon-cyan)">${eff.emoji} 召唤·${eff.name}</span> <span style="color:var(--paper-dark)">${eff.desc}</span>`;
    } else {
    const eval_ = evaluateSentence(G.sentence);
    if (eval_) {
      const parts = [];
      if (eval_.effects.selfHarm) {
        parts.push(`💔自伤${eval_.effects.selfHarmDmg}`);
        if (eval_.effects.selfHarmBuff) parts.push(`+${eval_.effects.selfHarmBuff}力量`);
      }
      if (eval_.effects.damage > 0) parts.push(`⚔️${eval_.effects.damage}`);
      if (eval_.effects.isQuestion) parts.push(`❓削弱${eval_.effects.applyWeak}`);
      if (eval_.effects.block > 0) parts.push(`🛡${eval_.effects.block}`);
      if (eval_.effects.heal > 0) parts.push(`♥${eval_.effects.heal}`);
      if (eval_.effects.strengthGain > 0) parts.push(`↑${eval_.effects.strengthGain}力`);
      if (eval_.effects.draw > 0) parts.push(`📜${eval_.effects.draw}牌`);
      if (eval_.effects.multiTargetIndices && eval_.effects.multiTargetIndices.length > 1) parts.push(`🎯多目标×${eval_.effects.multiTargetIndices.length}`);
      if (eval_.effects.aoe) parts.push('🌊全体');
      if (eval_.effects.ignoreBlock) parts.push('🗡穿透');
      if (eval_.effects.goldGain > 0) parts.push(`💰${eval_.effects.goldGain}`);
      sp.innerHTML = `<span>费${getSentenceCost()}</span> ${parts.join(' ')} <span style="color:var(--gold)">✨×${eval_.totalMult.toFixed(2)}</span>`;
    }
    } // close summon else
  } else {
    sp.innerHTML = '';
  }
}

function createSentenceWordEl(card, idx) {
  const el = document.createElement('div');
  el.className = 'sentence-word';
  if (card._isEnemyTarget) el.classList.add('enemy-obj');
  else if (card._isSelfTarget) el.classList.add('self-target');
  else if (card.pos === 'punctuation') el.classList.add('punct-end');
  else if (card.pos === 'exclamation') el.classList.add('exclamation-word');
  else {
    el.style.borderColor = getPosColor(card.pos);
    el.style.color = getPosColor(card.pos);
  }
  el.textContent = card._isEnemyTarget ? `⟨${card.word}⟩` : (card._isSelfTarget ? '⟨我⟩' : card.word);
  el.onclick = () => removeSentenceWord(idx);
  return el;
}

function getPosColor(pos) {
  switch(pos) {
    case 'subject': return '#e07070';
    case 'verb': return '#e8c84c';
    case 'object': return '#7090d4';
    case 'modifier': return '#70d490';
    case 'connector': return '#8a8275';
    case 'special': return '#b470d4';
    case 'punctuation': return '#9b59b6';
    case 'exclamation': return '#e8873a';
    default: return '#d4c9a8';
  }
}

function renderHand() {
  const handEl = document.getElementById('hand-cards');
  handEl.innerHTML = '';
  G.hand.forEach((card, idx) => {
    const el = createCardElement(card, idx);
    if (G.sentence.includes(card)) el.classList.add('in-sentence');
    handEl.appendChild(el);
  });
}

function createCardElement(card, handIndex, opts={}) {
  const div = document.createElement('div');
  div.className = `card pos-${card.pos}`;
  if (card.upgraded) div.classList.add('upgraded');
  if (card.rarity === 'uncommon') div.classList.add('rarity-uncommon');
  if (card.rarity === 'rare') div.classList.add('rarity-rare');

  const cost = getEffectiveCost(card);
  let descText = '';
  if (typeof card.desc === 'function') descText = card.desc(card);
  else if (typeof card.desc === 'string') descText = card.desc;

  const posNames = { subject:'主语', verb:'谓语', object:'宾语', modifier:'修饰', connector:'连接', special:'特殊', punctuation:'标点', exclamation:'感叹' };

  div.innerHTML = `
    <div class="card-cost">${cost}</div>
    <div class="card-pos-tag">${posNames[card.pos]||card.pos}</div>
    <div class="card-word">${card.word}${card.upgraded?'+':''}</div>
    <div class="card-effect-bar">${descText}</div>
  `;

  if (handIndex !== undefined && handIndex !== null && !opts.noClick) {
    div.onclick = (e) => { e.stopPropagation(); addToSentence(handIndex); };
  }

  div.onmouseenter = (e) => showTooltip(e, card);
  div.onmouseleave = hideTooltip;

  return div;
}

function showTooltip(e, card) {
  const tt = document.getElementById('tooltip');
  const posNames = { subject:'主语', verb:'谓语', object:'宾语', modifier:'修饰', connector:'连接', special:'特殊', punctuation:'标点', exclamation:'感叹' };
  const rarityNames = { starter:'初始', common:'普通', uncommon:'非凡', rare:'稀有' };
  tt.querySelector('.tt-name').textContent = card.word + (card.upgraded?'+':'');
  tt.querySelector('.tt-type').textContent = `${posNames[card.pos]} · ${rarityNames[card.rarity]||card.rarity} · 费用${getEffectiveCost(card)}`;
  let d = typeof card.desc === 'function' ? card.desc(card) : (card.desc||'');
  tt.querySelector('.tt-desc').textContent = d;
  tt.querySelector('.tt-flavor').textContent = card.flavor ? `"${card.flavor}"` : '';
  tt.style.display = 'block';
  const r = e.target.getBoundingClientRect();
  let left = r.right+10, top = r.top;
  if (left+240>window.innerWidth) left=r.left-250;
  if (top+120>window.innerHeight) top=window.innerHeight-130;
  tt.style.left = Math.max(5,left)+'px';
  tt.style.top = Math.max(5,top)+'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display='none'; }

// ============================================================
// SENTENCE BUILDING
// ============================================================
function addToSentence(handIndex) {
  const card = G.hand[handIndex];
  if (G.sentence.includes(card)) return;

  if (card.pos === 'punctuation' && card.punctType === 'comma') {
    if (G.sentence.some(c => c.pos === 'punctuation' && c.punctType === 'comma')) return;
  }

  G.sentence.push(card);
  playSFX('card');
  renderCombat();
  // Animate last word entering sentence area
  requestAnimationFrame(() => {
    const words = document.querySelectorAll('#sentence-slots-container .sentence-word');
    if (words.length > 0) words[words.length - 1].classList.add('sentence-word-enter');
    // Check for sentence completeness glow
    const hasVerb = G.sentence.some(c => c.pos === 'verb');
    const hasTarget = G.sentence.some(c => c._isEnemyTarget || c._isSelfTarget);
    document.getElementById('sentence-area').classList.toggle('sentence-complete', hasVerb && hasTarget);
  });
}

function removeSentenceWord(idx) {

    G.sentence.splice(idx, 1);
  }
  renderCombat();
}

function updateChantButton() {
  const btn = document.getElementById('chant-btn');
  const cost = getSentenceCost();
  const hasVerb = G.sentence.some(c => c.pos === 'verb' || c.pos === 'special');
  const isSummon = detectSummon(G.sentence) !== null;
  btn.disabled = G.sentence.length === 0 || cost > G.energy || (!hasVerb && !isSummon);
  btn.style.opacity = btn.disabled ? '0.35' : '1';
  btn.textContent = G.sentence.length > 0 ? (isSummon ? `召唤 (${cost}文力)` : `吟诵 (${cost}文力)`) : '吟诵';
}

// ============================================================
// CHANT
// ============================================================
function chantSentence() {
  if (G.sentence.length === 0) return;
  const cost = getSentenceCost();
  if (cost > G.energy) return;

  const summon = detectSummon(G.sentence);
  const hasVerb = G.sentence.some(c => c.pos === 'verb' || c.pos === 'special');
  if (!hasVerb && !summon) return;

  G.energy -= cost;
  G.sentencesChanted++;
  playSFX('chant');
  VFX.inkRipple();

  // Move cards from hand to discard/exhaust
  const sentenceCards = [...G.sentence];
  G.sentence = [];
  sentenceCards.forEach(card => {
    if (card._isEnemyTarget || card._isSelfTarget) return;
    const idx = G.hand.indexOf(card);
    if (idx >= 0) G.hand.splice(idx, 1);
    if (card.exhaust || (card.pos === 'verb' && card._shouldExhaust)) {
      G.exhaustPile.push(card);
    } else {
      G.discardPile.push(card);
    }
  });

  if (summon) {
    // Summon path
    const effect = SUMMON_EFFECTS[summon.summonName];
    const sentText = '「' + summon.text + '」';

    // Show summon animation via score overlay
    const overlay = document.getElementById('score-overlay');
    const sentEl = document.getElementById('score-sentence');
    const detailEl = document.getElementById('score-details');
    sentEl.textContent = sentText;
    detailEl.innerHTML = `
      <div class="score-line" style="animation-delay:0ms;color:var(--neon-cyan);font-size:1.2rem;">
        ${effect.emoji} 召唤·${effect.name}！
      </div>
      <div class="score-line" style="animation-delay:200ms;color:var(--paper-dark);">
        ${effect.desc}
      </div>
    `;
    overlay.classList.add('active');
    VFX.excFlash('#00ffcc');
    VFX.shake('sm');

    setTimeout(() => {
      overlay.classList.remove('active');
      effect.apply();
      checkEnemies();
      renderCombat();
    }, 1200);
  } else {
    // Normal sentence path
    const result = evaluateSentence(sentenceCards);
    showScoreAnimation(result, () => {
      applyEffects(result.effects);
      checkEnemies();
      renderCombat();
    });
  }
}

function applyEffects(effects) {
  if (effects.zeroCost) {
    G.allCardsCostZero = true;
    showFloatingText(document.querySelector('#combat-top'), '所有词牌费用为0！', '#c9a84c');
  }

  if (effects._spendGold) {
    G.gold -= effects._spendGold;
    if (G.gold < 0) G.gold = 0;
    showFloatingText(document.querySelector('#combat-top'), `-${effects._spendGold}金`, '#c9a84c');
  }

  if (effects._discardRandom && G.hand.length > 0) {
    for (let i = 0; i < effects._discardRandom && G.hand.length > 0; i++) {
      const ridx = Math.floor(Math.random() * G.hand.length);
      G.discardPile.push(G.hand.splice(ridx, 1)[0]);
    }
    showFloatingText(document.querySelector('#combat-top'), '删牌！', '#d4a870');
  }

  if (effects.selfHarm) {
    playSFX('selfharm');
    const dmg = effects.selfHarmDmg;
    G.hp -= dmg;
    if (G.hp < 1) G.hp = 1;
    showFloatingText(document.querySelector('#combat-top'), `-${dmg}自伤`, '#b470d4');
    if (effects.selfHarmBuff) {
      G.strength += effects.selfHarmBuff;
      showFloatingText(document.querySelector('#combat-top'), `+${effects.selfHarmBuff}力量`, '#70d490');
    }
    document.getElementById('game').classList.add('self-harm-flash');
    setTimeout(() => document.getElementById('game').classList.remove('self-harm-flash'), 600);
  }

  if (effects.block > 0) {
    G.block += effects.block;
    playSFX('block');
    VFX.damageNum(document.getElementById('player-status-bar'), `+${effects.block}🛡`, '#6bc8ff', 2.2);
  }

  if (effects.heal > 0) {
    G.hp = Math.min(G.maxHp, G.hp + effects.heal);
    playSFX('heal');
    VFX.damageNum(document.getElementById('player-status-bar'), `+${effects.heal}♥`, '#6bff6b', 2.2);
    VFX.rollHp(document.getElementById('combat-hp'));
  }

  if (effects.strengthGain > 0) {
    G.strength += effects.strengthGain;
    showFloatingText(document.querySelector('#combat-top'), `+${effects.strengthGain}力量`, '#70d490');
  }

  if (effects.draw > 0) drawCards(effects.draw);

  if (effects.goldGain > 0) {
    G.gold += effects.goldGain;
    showFloatingText(document.querySelector('#combat-top'), `+${effects.goldGain}金`, '#c9a84c');
  }

  if (effects.drawLessNext > 0) G.drawLessNextTurn += effects.drawLessNext;

  if (effects.thorns > 0) G._thorns = (G._thorns || 0) + effects.thorns;

  // 踹 kickback: 50% chance enemy skips next attack
  if (effects._kickback) {
    const tIdx = effects.targetEnemyIdx >= 0 ? effects.targetEnemyIdx : G.enemies.findIndex(e => e.hp > 0);
    if (tIdx >= 0 && G.enemies[tIdx] && G.enemies[tIdx].hp > 0 && Math.random() < 0.5) {
      G.enemies[tIdx].stunned = true;
      showFloatingText(G.enemies[tIdx].element, '击退！', '#d4a870');
    }
  }
  // 喷 reduceBlock
  if (effects._reduceEnemyBlock) {
    G.enemies.forEach(e => { if (e.hp > 0) { e.block = Math.max(0, e.block - effects._reduceEnemyBlock); } });
  }
  // 嘲讽 taunt
  if (effects._taunt) {
    G.enemies.forEach(e => { if (e.hp > 0) e._mustAttackPlayer = true; });
    showFloatingText(document.querySelector('#combat-top'), '嘲讽！', '#e8873a');
  }
  // 忽悠 confuse
  if (effects._confuse) {
    const alive = G.enemies.filter(e => e.hp > 0);
    if (alive.length > 1) {
      const target = alive[Math.floor(Math.random() * alive.length)];
      const dmg = target.nextIntent && target.nextIntent.value ? target.nextIntent.value : 5;
      target.hp -= dmg; if (target.hp < 0) target.hp = 0;
      showFloatingText(target.element, `自伤${dmg}！`, '#d4a870');
    } else if (alive.length === 1) {
      const e = alive[0]; const dmg = 5;
      e.hp -= dmg; if (e.hp < 0) e.hp = 0;
      showFloatingText(e.element, `自伤${dmg}！`, '#d4a870');
    }
  }
  // 硬扛 vulnSelfNext
  if (effects._vulnSelfNext) {
    G.vulnerable = Math.max(G.vulnerable, 1);
    showFloatingText(document.querySelector('#combat-top'), '下回合易伤！', '#d47070');
  }

  if (effects._bonusEnergy > 0) {
    G._bonusEnergyNext = (G._bonusEnergyNext || 0) + effects._bonusEnergy;
    showFloatingText(document.querySelector('#combat-top'), `下回合+${effects._bonusEnergy}能量`, '#c9a84c');
  }

  if (effects.applyVuln > 0) {
    G.enemies.forEach(e => { if (e.hp > 0) e.vulnerable = (e.vulnerable||0) + effects.applyVuln; });
  }

  // Stun enemy (摆烂 vs enemy)
  if (effects._stunEnemy) {
    const tIdx = effects.targetEnemyIdx >= 0 ? effects.targetEnemyIdx : G.enemies.findIndex(e => e.hp > 0);
    if (tIdx >= 0 && G.enemies[tIdx] && G.enemies[tIdx].hp > 0) {
      G.enemies[tIdx].stunned = true;
      showFloatingText(G.enemies[tIdx].element, '摆烂！跳过', '#d4a870');
    }
  }

  // Remove enemy buffs (真相)
  if (effects._removeBuffs) {
    G.enemies.forEach(e => { if (e.hp > 0) { e.strength = 0; e.block = 0; } });
    showFloatingText(document.querySelector('#enemy-area'), '增益清除！', '#7090d4');
  }

  if (effects.applyWeak > 0) {
    if (effects.aoe) {
      G.enemies.forEach(e => { if (e.hp > 0) { e.weak = (e.weak||0) + effects.applyWeak; } });
      showFloatingText(document.querySelector('#enemy-area'), `全体削弱${effects.applyWeak}`, '#d4a870');
    } else if (effects.targetEnemyIdx >= 0) {
      const tgt = G.enemies[effects.targetEnemyIdx];
      if (tgt && tgt.hp > 0) { tgt.weak = (tgt.weak||0) + effects.applyWeak; showFloatingText(tgt.element, `弱${effects.applyWeak}`, '#d4a870'); }
    } else {
      const tIdx = G.enemies.findIndex(e => e.hp > 0);
      if (tIdx >= 0) { G.enemies[tIdx].weak = (G.enemies[tIdx].weak||0) + effects.applyWeak; showFloatingText(G.enemies[tIdx].element, `弱${effects.applyWeak}`, '#d4a870'); }
    }
  }

  if (effects.damage > 0) {
    if (effects.aoe) {
      G.enemies.forEach((e, idx) => { if (e.hp > 0) dealDamageToEnemy(idx, effects.damage, effects.ignoreBlock); });
    } else if (effects.multiTargetIndices && effects.multiTargetIndices.length > 1) {
      effects.multiTargetIndices.forEach(tIdx => {
        if (G.enemies[tIdx] && G.enemies[tIdx].hp > 0) dealDamageToEnemy(tIdx, effects.damage, effects.ignoreBlock);
      });
    } else if (effects.targetEnemyIdx >= 0) {
      const tIdx = effects.targetEnemyIdx;
      if (G.enemies[tIdx] && G.enemies[tIdx].hp > 0) dealDamageToEnemy(tIdx, effects.damage, effects.ignoreBlock);
      else {
        const fallback = G.enemies.findIndex(e => e.hp > 0);
        if (fallback >= 0) dealDamageToEnemy(fallback, effects.damage, effects.ignoreBlock);
      }
    } else {
      const targetIdx = G.enemies.findIndex(e => e.hp > 0);
      if (targetIdx >= 0) dealDamageToEnemy(targetIdx, effects.damage, effects.ignoreBlock);
    }
  }
}

function showScoreAnimation(result, callback) {
  const overlay = document.getElementById('score-overlay');
  const sentEl = document.getElementById('score-sentence');
  const detailEl = document.getElementById('score-details');

  sentEl.textContent = '「' + result.text + '」';

  let html = '';
  let delay = 0;

  result.grammarNotes.forEach(n => {
    html += `<div class="score-line" style="animation-delay:${delay}ms">📜 ${n}</div>`;
    delay += 150;
  });

  result.literaryNotes.forEach(n => {
    html += `<div class="score-line" style="animation-delay:${delay}ms;color:var(--gold)">✨ ${n}</div>`;
    delay += 150;
  });

  if (result.punctNotes && result.punctNotes.length > 0) {
    result.punctNotes.forEach(n => {
      html += `<div class="score-line" style="animation-delay:${delay}ms;color:var(--purple)">✎ ${n}</div>`;
      delay += 150;
    });
  }

  if (result.excNotes && result.excNotes.length > 0) {
    const excCards = result.cards.filter(c => c.pos === 'exclamation');
    let chainDelay = delay;
    result.excNotes.forEach((n, i) => {
      html += `<div class="score-line" style="animation-delay:${delay}ms"><span class="multiplier-bounce" style="animation-delay:${delay}ms">${n}</span></div>`;
      // Balatro chain pop
      const exc = excCards[Math.min(i, excCards.length-1)];
      const isNiubi = exc && exc.word === '牛逼';
      const isWocao = exc && exc.word === '卧槽';
      const color = isNiubi ? '#e8c84c' : isWocao ? '#e8873a' : '#00ffcc';
      const mult = exc ? (exc.excMult || 1.2) : 1.2;
      VFX.excChainPop(`×${mult}`, color, chainDelay, 3 + i * 0.5);
      VFX.excFlash(color);
      if (isNiubi) setTimeout(() => VFX.shake('md'), chainDelay);
      else if (isWocao) setTimeout(() => VFX.shake('sm'), chainDelay);
      chainDelay += 350;
      delay += 250;
    });
  }

  html += `<div class="score-line" style="animation-delay:${delay}ms;color:var(--paper);font-weight:700">总倍率: ×${result.totalMult.toFixed(2)}</div>`;
  delay += 200;

  const parts = [];
  if (result.effects.selfHarm) parts.push(`💔 自伤${result.effects.selfHarmDmg}${result.effects.selfHarmBuff ? ' +'+result.effects.selfHarmBuff+'力量' : ''}`);
  if (result.effects.damage > 0) parts.push(`⚔ ${result.effects.damage}伤害${result.effects.aoe?' (群体)':''}${result.effects.ignoreBlock?' (穿透)':''}`);
  if (result.effects.isQuestion) parts.push(`❓ 削弱${result.effects.applyWeak}回合`);
  if (result.effects.block > 0) parts.push(`🛡 ${result.effects.block}格挡`);
  if (result.effects.heal > 0) parts.push(`♥ ${result.effects.heal}治疗`);
  if (result.effects.strengthGain > 0) parts.push(`↑ +${result.effects.strengthGain}力量`);
  if (result.effects.draw > 0) parts.push(`📜 抽${result.effects.draw}牌`);
  if (result.effects.goldGain > 0) parts.push(`💰 +${result.effects.goldGain}金`);

  if (parts.length > 0) {
    html += `<div class="score-effect score-line" style="animation-delay:${delay}ms">${parts.join(' | ')}</div>`;
  }

  detailEl.innerHTML = html;
  overlay.classList.add('active');

  const totalDelay = delay + 600;
  setTimeout(() => {
    overlay.classList.remove('active');
    callback();
  }, Math.min(totalDelay, 2000));
}

// ============================================================
// DAMAGE
// ============================================================
function dealDamageToEnemy(idx, amount, ignoreBlock) {
  const enemy = G.enemies[idx];
  if (!enemy || enemy.hp <= 0) return;
  if (enemy.vulnerable > 0) amount = Math.floor(amount * 1.5);
  if (enemy.reflecting) dealDamageToPlayer(Math.floor(amount * 0.5), enemy);

  if (!ignoreBlock && enemy.block > 0) {
    if (amount <= enemy.block) {
      enemy.block -= amount;
      if (enemy.element) { showFloatingText(enemy.element, `-${amount}`, '#6b9fff'); VFX.enemyHit(enemy.element); }
      return;
    }
    amount -= enemy.block;
    if (enemy.element) showFloatingText(enemy.element, `-${enemy.block}挡`, '#6b9fff');
    enemy.block = 0;
  }
  enemy.hp -= amount;
  if (enemy.hp < 0) enemy.hp = 0;
  playSFX('hit');
  if (enemy.element) {
    VFX.damageNum(enemy.element, `-${amount}`, '#ff6b6b', amount >= 20 ? 3.2 : amount >= 10 ? 2.5 : 2);
    VFX.enemyHit(enemy.element);
    if (amount >= 15) VFX.shake('sm');
    if (amount >= 25) VFX.shake('md');
    if (enemy.hp <= 0) setTimeout(() => VFX.enemyDeath(enemy.element), 200);
  }
}

function dealDamageToPlayer(amount, source) {
  if (source && source.strength) amount += source.strength;
  if (source && source.weak > 0) amount = Math.floor(amount * 0.75);
  if (G.vulnerable > 0) amount = Math.floor(amount * 1.5);

  if (G._thorns && G._thorns > 0 && source && source.hp > 0) {
    const thornsDmg = G._thorns;
    source.hp -= thornsDmg;
    if (source.hp < 0) source.hp = 0;
    if (source.element) showFloatingText(source.element, `-${thornsDmg}反伤`, '#d4a870');
  }

  if (G.block > 0) {
    if (amount <= G.block) {
      G.block -= amount;
      showFloatingText(document.querySelector('#combat-top'), `挡住${amount}`, '#6b9fff');
      playSFX('block');
      return;
    }
    const blocked = G.block; amount -= G.block; G.block = 0;
    showFloatingText(document.querySelector('#combat-top'), `挡住${blocked}`, '#6b9fff');
  }

  G.hp -= amount;
  if (G.hp < 0) G.hp = 0;
  VFX.damageNum(document.getElementById('player-status-bar'), `-${amount}`, '#ff6b6b', amount >= 15 ? 3 : 2.2);
  VFX.shake(amount >= 15 ? 'md' : 'sm');
  VFX.rollHp(document.getElementById('combat-hp'));
  if (G.hp <= 0) setTimeout(gameOver, 500);
}

function checkEnemies() {
  if (G.enemies.every(e => e.hp <= 0)) setTimeout(combatVictory, 600);
}

// ============================================================
// END TURN / ENEMY TURN
// ============================================================
function endPlayerTurn() {
  G.sentence = [];
  while (G.hand.length > 0) G.discardPile.push(G.hand.pop());
  setTimeout(enemyTurn, 300);
}

function enemyTurn() {
  let delay = 0;
  G.enemies.forEach((enemy) => {
    if (enemy.hp <= 0) return;
    enemy.block = 0;
    if (enemy.vulnerable > 0) enemy.vulnerable--;
    if (enemy.weak > 0) enemy.weak--;

    setTimeout(() => {
      if (enemy.hp <= 0) return;
      if (enemy.stunned) { enemy.stunned = false; showFloatingText(enemy.element,'眩晕！','#d4a870'); }
      else enemy.act_fn(enemy);
      enemy.ai(enemy);
      renderCombat();
      if (G.hp <= 0) return;
    }, delay);
    delay += 550;
  });
  setTimeout(() => { if (G.hp > 0) startPlayerTurn(); }, delay + 400);
}

// ============================================================
function combatVictory() {
  playSFX('heal');
  G._thorns = 0;
  const node = G.map[G.currentRow][G.currentNodeIndex];
  let gold = 0;
  if (node.type==='fight') gold = 10+Math.floor(Math.random()*11);
  else if (node.type==='elite') { gold = 25+Math.floor(Math.random()*26); G.elitesKilled++; }
  else if (node.type==='boss') { gold = 50+Math.floor(Math.random()*51); G.bossesKilled++; }
  G.gold += gold;
  G.combatRewards = { gold };

  if (node.type === 'boss' && G.act >= 3) { setTimeout(showVictoryScreen, 500); return; }
  showRewardScreen();
}

function showRewardScreen() {
  showScreen('reward-screen');
  playAmbientMusic();
  document.getElementById('reward-gold-text').textContent = `+${G.combatRewards.gold} 文银`;
  const container = document.getElementById('reward-cards');
  container.innerHTML = '';

  for (let i = 0; i < 3; i++) {
    const roll = Math.random();
    let rarity;
    if (roll < 0.50) rarity = 'common';
    else if (roll < 0.82) rarity = 'uncommon';
    else rarity = 'rare';
    let card = randomCardWeighted(rarity);

    const wrapper = document.createElement('div');
    wrapper.className = 'reward-card-wrapper';
    const cardEl = createCardElement(card, null, { noClick: true });
    cardEl.style.cursor = 'pointer';
    cardEl.onclick = () => { G.deck.push(card); afterReward(); };
    const rl = document.createElement('div');
    rl.className = `rarity-label rarity-${card.rarity}`;
    rl.textContent = card.rarity === 'common' ? '普通' : card.rarity === 'uncommon' ? '非凡' : '稀有';
    wrapper.appendChild(cardEl);
    wrapper.appendChild(rl);
    container.appendChild(wrapper);
  }
}

function skipReward() { afterReward(); }

function afterReward() {
  const node = G.map[G.currentRow][G.currentNodeIndex];
  if (node.type === 'boss') {
    G.act++; G.currentRow = -1; G.currentNodeIndex = -1;
    G.map = generateMap(G.act); G.strength = 0;

function renderShop() {
  document.getElementById('shop-gold').textContent = G.gold;

  c.innerHTML = '';
  if (!G.shopInventory) {
    G.shopInventory = [];
    for (let i=0; i<5; i++) {

      let rarity, price;
      if (roll<0.4) { rarity='common'; price=45+Math.floor(Math.random()*25); }

      G.shopInventory.push({ card: randomCardWeighted(rarity), price, sold: false });
    }
  }
  G.shopInventory.forEach((item, idx) => {
    if (item.sold) return;
    const w = document.createElement('div');
    w.className = 'shop-card-slot';
    const el = createCardElement(item.card, null, { noClick: true });
    el.style.cursor = 'pointer';
    el.onclick = () => {
      if (G.gold >= item.price && !item.sold) {
        G.gold -= item.price; G.deck.push(item.card); item.sold = true;
        playSFX('card'); renderShop();
      }
    };
    const p = document.createElement('div');
    p.className = `shop-price ${G.gold<item.price?'cannot-afford':''}`;
    p.textContent = `${item.price}文银`;
    w.appendChild(el); w.appendChild(p); c.appendChild(w);
  });
  document.getElementById('shop-remove-btn').style.opacity = G.gold >= 75 ? '1' : '0.4';
}
function shopRemoveCard() {
  if (G.gold < 75) return;
  const grid = document.getElementById('remove-cards-grid');
  grid.innerHTML = '';
  G.deck.forEach((card, idx) => {
    const el = createCardElement(card, null, { noClick: true });
    el.style.cursor = 'pointer';
    el.onclick = () => { G.deck.splice(idx,1); G.gold-=75; playSFX('card'); closeRemove(); renderShop(); };
    grid.appendChild(el);
  });
  document.getElementById('remove-overlay').classList.add('active');
}
function closeRemove() { document.getElementById('remove-overlay').classList.remove('active'); }
function leaveShop() { G.shopInventory=null; showScreen('map-screen'); renderMap(); }

// ============================================================
// DECK VIEW
// ============================================================
function viewDeck() {
  const grid = document.getElementById('deck-cards-grid');
  grid.innerHTML = '';
  document.getElementById('deck-count').textContent = G.deck.length;
  G.deck.forEach(card => grid.appendChild(createCardElement(card, null, { noClick: true })));
  document.getElementById('deck-overlay').classList.add('active');
}
function closeDeck() { document.getElementById('deck-overlay').classList.remove('active'); }

// ============================================================
// GAME OVER / VICTORY
// ============================================================
function calculateInkReward(isVictory) {
  const b = []; let total = 0;
  const add = (l,v) => { if(v>0){b.push({label:l,value:v});total+=v;} };
  add(`行过${G.floorsCleared}层`, G.floorsCleared*2);
  add(`斩精英${G.elitesKilled}`, G.elitesKilled*5);
  add(`败Boss${G.bossesKilled}`, G.bossesKilled*15);
  add(`吟诵${G.sentencesChanted}句`, Math.floor(G.sentencesChanted/3));
  if(G.act>=2) add('至第二章', 5);
  if(G.act>=3) add('至第三章', 10);
  if(isVictory) add('大作已成！', 20);
  if(total<3) { add('最低奖励', 3-total); total=3; }
  return { breakdown:b, total };
}

function updateMetaAfterRun(isV) {
  const r = calculateInkReward(isV);
  META.ink += r.total; META.totalInk += r.total;
  if(G.act>META.bestAct) META.bestAct=G.act;
  if(G.floorsCleared>META.bestFloor) META.bestFloor=G.floorsCleared;
  saveMeta();
  return { reward: r };
}

function renderInkBreakdown(id, reward) {
  const el = document.getElementById(id);
  let h = '<div class="ink-reward-breakdown">';
  reward.breakdown.forEach(i => { h+=`<div class="ink-line"><span>${i.label}</span><span style="color:var(--gold)">+${i.value}文气</span></div>`; });
  h += `<div class="ink-line ink-total"><span>总计</span><span>+${reward.total}文气</span></div></div>`;
  el.innerHTML = h;
}

function gameOver() {
  stopMusic(); playSFX('death');
  const r = updateMetaAfterRun(false);
  showScreen('gameover-screen');
  document.getElementById('gameover-stats').innerHTML = `
    <div>章节：<span>${G.actNames[G.act]}</span></div>
    <div>行过：<span>${G.floorsCleared}层</span></div>
    <div>精英：<span>${G.elitesKilled}</span></div>
    <div>Boss：<span>${G.bossesKilled}</span></div>
    <div>吟诵：<span>${G.sentencesChanted}句</span></div>
    <div>文银：<span>${G.gold}</span></div>
  `;
  renderInkBreakdown('gameover-ink-breakdown', r.reward);
}

function showVictoryScreen() {
  stopMusic();
  if(audioCtx) {
    const t=audioCtx.currentTime;
    [261.6,329.6,392.0,523.3].forEach((f,i)=>{
      playNote(f,1.5,'sine',t+i*0.4,0.12);
    });
  }
  const r = updateMetaAfterRun(true);
  showScreen('victory-screen');
  document.getElementById('victory-stats').innerHTML = `
    <div>三章完结！</div>
    <div>行过：<span>${G.floorsCleared}层</span></div>
    <div>精英：<span>${G.elitesKilled}</span></div>
    <div>Boss：<span>${G.bossesKilled}</span></div>
    <div>吟诵：<span>${G.sentencesChanted}句</span></div>
    <div>词库：<span>${G.deck.length}张</span></div>
  `;
  renderInkBreakdown('victory-ink-breakdown', r.reward);
}

// ============================================================
// UTILITIES
// ============================================================
function shuffleArray(arr) {
  for (let i=arr.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function showFloatingText(element, text, color) {
  if (!element) return;
  const d = document.createElement('div');
  d.className = 'damage-number';
  if (color==='#6bff6b') d.classList.add('heal');
  if (color==='#6b9fff') d.classList.add('block-dmg');
  d.textContent = text; d.style.color = color;
  d.style.left = '50%'; d.style.top = '50%';
  d.style.transform = 'translate(-50%,-50%)';
  element.style.position = 'relative';
  element.appendChild(d);
  setTimeout(() => d.remove(), 1000);
}

// ============================================================
// META SCREEN
// ============================================================
function showMetaScreen() {
  document.getElementById('meta-overlay').classList.add('active');
  renderMetaScreen();
}
function closeMetaScreen() { document.getElementById('meta-overlay').classList.remove('active'); }

function renderMetaScreen() {
  document.getElementById('meta-stats').innerHTML = `
    <div class="meta-stat"><div class="stat-val">${META.ink}</div><div class="stat-label">文气</div></div>
    <div class="meta-stat"><div class="stat-val">${META.totalInk}</div><div class="stat-label">累计</div></div>
    <div class="meta-stat"><div class="stat-val">${META.runs}</div><div class="stat-label">冒险</div></div>
    <div class="meta-stat"><div class="stat-val">${META.bestFloor}</div><div class="stat-label">最深</div></div>
  `;

  let ph = '<h3>文房四宝（永久加成）</h3>';
  for (const [key, perk] of Object.entries(LEGACY_PERKS)) {
    const owned = META.perks.includes(key);
    ph += `<div class="meta-item${owned?' purchased':''}">
      <div class="item-info"><div class="item-name">${perk.name}</div><div class="item-desc">${perk.desc}</div></div>
      <div class="item-cost">${perk.cost}文气</div>
      ${owned?'':`<button class="buy-btn" onclick="buyPerk('${key}')" ${META.ink>=perk.cost?'':'disabled'}>购买</button>`}
    </div>`;
  }
  document.getElementById('meta-perks-section').innerHTML = ph;

  let ch = '<h3>解锁新词牌</h3>';
  for (const [key, info] of Object.entries(UNLOCKABLE_CARDS_META)) {
    const owned = META.unlockedCards.includes(key);
    ch += `<div class="meta-item${owned?' purchased':''}">
      <div class="item-info"><div class="item-name">${info.name}</div></div>
      <div class="item-cost">${info.cost}文气</div>
      ${owned?'':`<button class="buy-btn" onclick="buyCardMeta('${key}')" ${META.ink>=info.cost?'':'disabled'}>解锁</button>`}
    </div>`;
  }
  document.getElementById('meta-cards-section').innerHTML = ch;
}

function buyPerk(key) {
  const p = LEGACY_PERKS[key];
  if(!p||META.perks.includes(key)||META.ink<p.cost) return;
  META.ink-=p.cost; META.perks.push(key); saveMeta(); playSFX('card'); renderMetaScreen();
}
function buyCardMeta(key) {
  const info = UNLOCKABLE_CARDS_META[key];
  if(!info||META.unlockedCards.includes(key)||META.ink<info.cost) return;
  META.ink-=info.cost; META.unlockedCards.push(key); saveMeta(); playSFX('card'); renderMetaScreen();
}

// ============================================================
// V6.2 ANIMATION SYSTEM
// ============================================================
const VFX = {
  // Screen shake
  shake(intensity = 'sm') {
    const el = document.getElementById('game');
    el.classList.remove('screen-shake-sm','screen-shake-md','screen-shake-lg');
    void el.offsetWidth; // force reflow
    el.classList.add(`screen-shake-${intensity}`);
    setTimeout(() => el.classList.remove(`screen-shake-${intensity}`), intensity==='lg'?500:intensity==='md'?400:300);
  },

  // Floating damage number (big, fixed position)
  damageNum(element, text, color, size = 2.2) {
    if (!element) return;
    const rect = element.getBoundingClientRect();
    const d = document.createElement('div');
    d.className = 'dmg-num-v2';
    d.textContent = text;
    d.style.color = color;
    d.style.fontSize = size + 'rem';
    d.style.left = (rect.left + rect.width/2) + 'px';
    d.style.top = (rect.top + rect.height/2) + 'px';
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 950);
  },

  // Enemy hit effect
  enemyHit(enemyEl) {
    if (!enemyEl) return;
    enemyEl.classList.remove('enemy-hit-flash','enemy-shake');
    void enemyEl.offsetWidth;
    enemyEl.classList.add('enemy-hit-flash','enemy-shake');
    setTimeout(() => enemyEl.classList.remove('enemy-hit-flash','enemy-shake'), 450);
  },

  // Enemy death
  enemyDeath(enemyEl) {
    if (!enemyEl) return;
    enemyEl.classList.add('enemy-death');
  },

  // Ink ripple (chant)
  inkRipple() {
    const r = document.createElement('div');
    r.className = 'ink-ripple';
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 850);
  },

  // Turn start circle
  turnCircle() {
    const c = document.createElement('div');
    c.className = 'turn-start-circle';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 750);
  },

  // Exclamation flash
  excFlash(color) {
    const f = document.createElement('div');
    f.className = 'exc-flash';
    f.style.background = `radial-gradient(circle, ${color}40, transparent 70%)`;
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 400);
  },

  // Exclamation chain pop (Balatro style)
  excChainPop(text, color, delay, size = 3) {
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = 'exc-chain-num';
      d.textContent = text;
      d.style.color = color;
      d.style.fontSize = size + 'rem';
      d.style.left = '50%';
      d.style.top = '40%';
      document.body.appendChild(d);
      VFX.shake(size > 3 ? 'md' : 'sm');
      setTimeout(() => d.remove(), 700);
    }, delay);
  },

  // HP rolling animation
  rollHp(element) {
    if (!element) return;
    element.classList.remove('hp-rolling');
    void element.offsetWidth;
    element.classList.add('hp-rolling');
    setTimeout(() => element.classList.remove('hp-rolling'), 350);
  },

  // Spawn ink particles in combat background
  spawnInkParticles() {
    const area = document.getElementById('combat-screen');
    // Remove old particles
    area.querySelectorAll('.ink-particle').forEach(p => p.remove());
    for (let i = 0; i < 5; i++) {
      const p = document.createElement('div');
      p.className = 'ink-particle';
      const size = 80 + Math.random() * 160;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = (Math.random() * 100) + '%';
      p.style.top = (20 + Math.random() * 60) + '%';
      p.style.animationDuration = (15 + Math.random() * 20) + 's';
      p.style.animationDelay = (-Math.random() * 15) + 's';
      area.appendChild(p);
    }
  },
};

// Init
(function() {
  const el = document.getElementById('title-ink-display');
  if (el && META.totalInk > 0) el.textContent = `文气: ${META.ink} | 冒险: ${META.runs}`;
})();
</script>
